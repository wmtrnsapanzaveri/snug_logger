name: Create Release Tag

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag if missing
        shell: bash
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          CURRENT_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          TAG_NAME="v$CURRENT_VERSION"

          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping."
            exit 0
          fi

          if [ -z "$RELEASE_PAT" ]; then
            echo "RELEASE_PAT is not set. Skipping tag push."
            echo "Add RELEASE_PAT (classic PAT with repo scope) to trigger publish workflow from created tags."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Created and pushed tag: $TAG_NAME"
