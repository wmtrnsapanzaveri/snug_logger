name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  MIN_PANA_SCORE: "160"

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Package publish dry run
        run: dart pub publish --dry-run

      - name: Install pana
        run: dart pub global activate pana

      - name: Run pana
        shell: bash
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          pana --no-warning . | tee pana_output.txt

      - name: Enforce minimum pana score
        shell: bash
        run: |
          SCORE="$(sed -n 's/.*Points: \([0-9][0-9]*\)\/160.*/\1/p' pana_output.txt | tail -1)"
          if [ -z "$SCORE" ]; then
            echo "Could not determine pana score from output."
            exit 1
          fi
          echo "pana score: $SCORE/160 (minimum required: $MIN_PANA_SCORE/160)"
          if [ "$SCORE" -lt "$MIN_PANA_SCORE" ]; then
            echo "pana score is below the configured minimum."
            exit 1
          fi

  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    needs:
      - quality-gates
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag on version change
        shell: bash
        run: |
          CURRENT_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          PREVIOUS_VERSION="$(git show HEAD^:pubspec.yaml 2>/dev/null | grep '^version:' | awk '{print $2}' || true)"
          TAG_NAME="v$CURRENT_VERSION"

          if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "Version not changed ($CURRENT_VERSION). Skipping tag creation."
            exit 0
          fi

          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Created and pushed tag: $TAG_NAME"
