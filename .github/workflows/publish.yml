name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate (example: v1.0.15). Leave empty to use v<pubspec version>."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  MIN_PANA_SCORE: "160"

jobs:
  quality-gates:
    name: Quality Gates (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze

      - name: Run tests (if present)
        shell: bash
        run: |
          if [ ! -d test ] || ! find test -type f -name '*_test.dart' | grep -q .; then
            echo "No *_test.dart files found. Skipping tests."
            exit 0
          fi

          if ! rg -n "^\s*(test|group)\(" test --glob '*_test.dart' >/dev/null; then
            echo "No executable test/group declarations found. Skipping tests."
            exit 0
          fi

          flutter test

      - name: Package publish dry run
        run: dart pub publish --dry-run

      - name: Install pana
        run: dart pub global activate pana

      - name: Run pana
        shell: bash
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          pana --no-warning . | tee pana_output.txt

      - name: Enforce full pana score
        shell: bash
        run: |
          SCORE="$(sed -n 's/.*Points: \([0-9][0-9]*\)\/160.*/\1/p' pana_output.txt | tail -1)"
          if [ -z "$SCORE" ]; then
            echo "Could not determine pana score from output."
            exit 1
          fi
          echo "pana score: $SCORE/160 (required: $MIN_PANA_SCORE/160)"
          if [ "$SCORE" -lt "$MIN_PANA_SCORE" ]; then
            echo "pana score is below required full score."
            exit 1
          fi

  publish:
    name: Publish To pub.dev
    runs-on: ubuntu-latest
    needs:
      - quality-gates
    if: always() && needs.quality-gates.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Validate release target and pub.dev status
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME="$(grep '^name:' pubspec.yaml | awk '{print $2}')"
          CURRENT_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          else
            TAG_NAME="${{ github.event.inputs.release_tag }}"
            if [ -z "$TAG_NAME" ]; then
              TAG_NAME="v$CURRENT_VERSION"
            fi
          fi
          EXPECTED_TAG="v$CURRENT_VERSION"
          PUB_API_URL="https://pub.dev/api/packages/$PACKAGE_NAME"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "expected_tag=$EXPECTED_TAG" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          if [ "$TAG_NAME" = "$EXPECTED_TAG" ]; then
            echo "Tag matches version: $TAG_NAME"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag/version mismatch. Found tag '$TAG_NAME' but pubspec version is '$CURRENT_VERSION' (expected '$EXPECTED_TAG')."
            exit 1
          fi

          if curl -fsS "$PUB_API_URL" -o pub_versions.json; then
            if grep -q "\"version\":\"$CURRENT_VERSION\"" pub_versions.json; then
              echo "Version $CURRENT_VERSION is already published on pub.dev. Skipping publish."
              echo "publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "Version $CURRENT_VERSION is not on pub.dev yet. Publish will proceed."
              echo "publish=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Could not query pub.dev API. Failing to avoid duplicate/unsafe publish."
            exit 1
          fi

      - name: Setup pub credentials (optional fallback)
        if: steps.version_check.outputs.publish == 'true'
        shell: bash
        env:
          PUB_CREDENTIALS_JSON: ${{ secrets.PUB_CREDENTIALS_JSON }}
        run: |
          if [ -z "$PUB_CREDENTIALS_JSON" ]; then
            echo "PUB_CREDENTIALS_JSON is not set; assuming trusted publishing is configured."
            exit 0
          fi
          mkdir -p "$HOME/.pub-cache"
          printf '%s' "$PUB_CREDENTIALS_JSON" > "$HOME/.pub-cache/credentials.json"

      - name: Publish package
        if: steps.version_check.outputs.publish == 'true'
        run: dart pub publish --force
